name: Update Firestore on Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update-firestore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if GitHub Release exists for this version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Get release notes from GitHub Release
        if: steps.check.outputs.exists == 'true'
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(gh release view "v${{ steps.version.outputs.version }}" --json body -q .body 2>/dev/null || echo "Bug fixes and improvements")
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Update Firestore app_config/version
        if: steps.check.outputs.exists == 'true'
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          DOWNLOAD_URL: "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/TBS_Invoice_Generator_Setup_${{ steps.version.outputs.version }}.exe"
          RELEASE_NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          npm install --silent google-auth-library
          node .github/scripts/update_firestore.js
