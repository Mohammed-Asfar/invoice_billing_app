name: Update Firestore on Release

# Triggered when a GitHub Release is published (by the release script)
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-firestore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version and notes from release
        id: info
        run: |
          # Tag name is like "v1.2.0", strip the "v"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Firestore app_config/version
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          APP_VERSION: ${{ steps.info.outputs.version }}
          DOWNLOAD_URL: "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/TBS_Invoice_Generator_Setup_${{ steps.info.outputs.version }}.exe"
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          npm install --silent google-auth-library
          node .github/scripts/update_firestore.js
